<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Taxi Green Domažlice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #111; color: #fff; }
        .back-btn { display: inline-block; padding: 12px 24px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; margin-bottom: 20px; }
        #loading { text-align: center; margin-top: 50px; font-size: 20px; color: #27ae60; font-weight: bold; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .gallery-item { position: relative; background: #222; padding: 10px; border-radius: 8px; }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ Zpět na úvod</a>
    <div id="loading">⏳ Načítám fotografie...</div>
    <div class="gallery-grid" id="pswp-gallery"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyADi4Varza6j_uS8JBMYp9JIwiENIx4_L4", 
            authDomain: "taxi-green-domazlice.firebaseapp.com", 
            projectId: "taxi-green-domazlice", 
            databaseURL: "https://taxi-green-domazlice-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const galleryContainer = document.getElementById('pswp-gallery');
        const loadingDiv = document.getElementById('loading');

        // Načtení dat
        onValue(ref(db, 'fotogalerie'), (snapshot) => {
            loadingDiv.style.display = 'none';
            const data = snapshot.val();
            
            if (!data) {
                galleryContainer.innerHTML = "<p style='text-align:center;'>Zatím zde nejsou žádné fotografie.</p>";
                return;
            }

            galleryContainer.innerHTML = "";
            Object.values(data).forEach((foto) => {
                galleryContainer.innerHTML += `
                    <div class="gallery-item">
                        <img src="${foto.url}" alt="Taxi foto">
                        <p style="font-size:12px; margin-top:5px;">${foto.popisek || ''}</p>
                    </div>`;
            });
        }, (error) => {
            loadingDiv.innerText = "❌ Chyba: " + error.message;
        });
    </script>
</body>
</html>
