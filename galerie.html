<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Taxi Green Domažlice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.min.css">
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #111; color: #fff; }
        .back-btn { display: inline-block; padding: 12px 24px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; margin-bottom: 20px; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .gallery-item { position: relative; background: #222; padding: 10px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; transition: opacity 0.2s; }
        .gallery-item img:hover { opacity: 0.9; }
        
        .item-info { margin-top: 10px; font-size: 14px; }
        .item-number { color: #27ae60; font-weight: bold; margin-right: 5px; }
        .item-text { color: #ddd; }

        .delete-btn { 
            position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; 
            border: none; border-radius: 50%; width: 32px; height: 32px; font-weight: bold; 
            cursor: pointer; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Zpět na úvod</a>

    <div class="gallery-grid" id="pswp-gallery"></div>

    <script type="module">
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe-lightbox.esm.min.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyADi4Varza6j_uS8JBMYp9JIwiENIx4_L4", 
            authDomain: "taxi-green-domazlice.firebaseapp.com", 
            projectId: "taxi-green-domazlice", 
            databaseURL: "https://taxi-green-domazlice-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const galleryContainer = document.getElementById('pswp-gallery');

        // Zkontroluje, zda přichází přihlášený správce z index.html
        const isAdmin = localStorage.getItem('taxiAdmin') === 'true';

        // Načítání a automatické řazení dat
        onValue(ref(db, 'fotogalerie'), (snapshot) => {
            const data = snapshot.val() || {};
            galleryContainer.innerHTML = "";
            
            // Převod objektu z Firebase na pole, abychom ho mohli seřadit
            const fotkyPole = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            }));

            // Seřadit od nejnovější po nejstarší (podle času vytvoření)
            fotkyPole.sort((a, b) => (b.vytvoreno || 0) - (a.vytvoreno || 0));

            // Vykreslení do mřížky s dynamickým číslováním (bez mezer)
            fotkyPole.forEach((foto, index) => {
                const cisloFotky = index + 1;
                galleryContainer.innerHTML += `
                    <div class="gallery-item">
                        <a href="${foto.url}" data-pswp-width="1200" data-pswp-height="900" target="_blank">
                            <img src="${foto.url}" alt="${foto.popisek || 'Foto ' + cisloFotky}">
                        </a>
                        <div class="item-info">
                            <span class="item-number">#${cisloFotky}</span>
                            <span class="item-text">${foto.popisek || 'Bez popisku'}</span>
                        </div>
                        <button class="delete-btn" style="display: ${isAdmin ? 'block' : 'none'}" onclick="smazFotku('${foto.id}')">X</button>
                    </div>`;
            });

            // Inicializace zvětšování PhotoSwipe
            const lightbox = new PhotoSwipeLightbox({
                gallery: '#pswp-gallery',
                children: 'a',
                pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.3/photoswipe.esm.min.js')
            });
            lightbox.init();
        });

        // Funkce pro mazání (přístupná jen pro admina)
        window.smazFotku = (id) => {
            if(confirm("Opravdu chcete smazat tuto fotografii? Ostatní se automaticky přečíslují.")) {
                remove(ref(db, 'fotogalerie/' + id));
            }
        };
    </script>
</body>
</html>
