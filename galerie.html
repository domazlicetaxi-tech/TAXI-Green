<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Taxi Green Domažlice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #111; color: #fff; }
        h1 { text-align: center; color: #27ae60; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background-color: #333; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; border: 1px solid #444; }
        
        /* Styl pro posuvník */
        .swiper { width: 100%; max-width: 600px; height: 400px; border-radius: 12px; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide img { display: block; width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Zpět</a>
    <h1>Galerie</h1>
    <div id="loading" style="text-align:center; color:#888;">⏳ Načítám...</div>

    <div class="swiper">
        <div class="swiper-wrapper" id="galerieSwiper"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADi4Varza6j_uS8JBMYp9JIwiENIx4_L4",
            authDomain: "taxi-green-domazlice.firebaseapp.com",
            projectId: "taxi-green-domazlice",
            messagingSenderId: "780503611359",
            appId: "1:780503611359:web:a106c743b759aab644f66a",
            databaseURL: "https://taxi-green-domazlice-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const swiperWrapper = document.getElementById('galerieSwiper');
        const loadingDiv = document.getElementById('loading');

        onValue(ref(db, 'fotogalerie'), (snapshot) => {
            if (snapshot.exists()) {
                loadingDiv.style.display = "none";
                const data = snapshot.val();
                const fotky = Object.values(data).sort((a,b) => b.vytvoreno - a.vytvoreno);
                
                swiperWrapper.innerHTML = "";
                fotky.forEach(f => {
                    swiperWrapper.innerHTML += `<div class="swiper-slide"><img src="${f.url}"></div>`;
                });

                // Inicializace posuvníku
                new Swiper('.swiper', {
                    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                    loop: true
                });
            } else {
                loadingDiv.innerText = "📸 Zatím žádné fotky.";
            }
        });
    </script>
</body>
</html>
