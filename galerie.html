<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Taxi Green Domažlice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #111; color: #fff; }
        .back-btn { display: inline-block; padding: 10px 20px; background: #333; color: #fff; text-decoration: none; border-radius: 6px; }
        
        /* Styl galerie */
        .swiper { width: 100%; max-width: 800px; height: 500px; margin-top: 20px; }
        .swiper-slide { position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; }
        
        /* Tlačítko mazání */
        .delete-btn { 
            position: absolute; top: 10px; right: 10px; background: red; color: white; 
            padding: 10px; border-radius: 50%; cursor: pointer; border: none; z-index: 10; display: none; 
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Zpět</a>
    <div id="adminLogin" style="margin-top:10px;">
        <input type="password" id="adminPass" placeholder="Heslo pro správu">
        <button onclick="checkAdmin()">Ověřit</button>
    </div>

    <div class="swiper">
        <div class="swiper-wrapper" id="galerieSwiper"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { /* tvoje data */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const swiperWrapper = document.getElementById('galerieSwiper');
        let isAdmin = false;

        window.checkAdmin = () => {
            if(document.getElementById('adminPass').value === "26 36 54") {
                isAdmin = true;
                document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
                alert("Jsi přihlášen jako správce - nyní můžeš mazat!");
            }
        };

        window.smazFotku = (key) => {
            if(confirm("Opravdu smazat tuto fotku?")) {
                remove(ref(db, 'fotogalerie/' + key));
            }
        };

        onValue(ref(db, 'fotogalerie'), (snapshot) => {
            const data = snapshot.val() || {};
            swiperWrapper.innerHTML = "";
            Object.keys(data).forEach(key => {
                const f = data[key];
                swiperWrapper.innerHTML += `
                    <div class="swiper-slide">
                        <img src="${f.url}" onclick="window.open('${f.url}', '_blank')">
                        <button class="delete-btn" style="display:${isAdmin?'block':'none'}" onclick="smazFotku('${key}')">X</button>
                    </div>`;
            });
            new Swiper('.swiper', { navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, loop: true });
        });
    </script>
</body>
</html>
