<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Green Domažlice</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }

        .taxi-header {
            width: 100%;
            height: 100vh;
            /* Změna zde: contain zajistí, že uvidíte celý obrázek */
            background-image: url('images/pozadi.png');
            background-size: contain; 
            background-position: center top; /* Pozadí drží nahoře, aby byl nápis vidět */
            background-repeat: no-repeat;
            background-color: #000; /* Barva pozadí kolem obrázku, pokud zbyde místo */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 20px;
        }

        .buttons-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px;
            background: rgba(0,0,0,0.2); /* Mírné podbarvení kontejneru pro lepší čitelnost */
        }

        .icon-button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background-color: #000;
            transition: transform 0.3s;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .icon-button:hover { transform: scale(1.1); }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Logo vyplní kruh, protože je už oříznuté */
            display: block;
        }

        @media (min-width: 600px) {
            .taxi-header { background-size: cover; background-position: center; } /* Na PC zůstane cover */
            .icon-button { width: 110px; height: 110px; }
            .buttons-container { gap: 20px; padding-bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
