<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            background-color: #000; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Hlavní sekce s obrázkem */
        .taxi-header {
            width: 100%;
            height: 80vh; /* Obrázek zabere 80 % výšky obrazovky */
            background-image: url('images/pozadi.png');
            background-size: contain; /* Celý obrázek bude vidět */
            background-repeat: no-repeat;
            background-position: center bottom;
        }

        /* Zelený pruh s tlačítky - bude pod obrázkem */
        .bottom-bar {
            flex-grow: 1; /* Zabere zbytek místa */
            background-color: #2e660a; /* Tmavě zelená */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 30px 10px;
        }

        /* Tlačítka */
        .icon-button {
            width: 100px;
            height: 100px;
            background-color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #a3ff66;
            overflow: hidden;
            transition: transform 0.2s;
            text-decoration: none;
        }
        .icon-button:hover { transform: scale(1.1); }
        .icon-button img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="taxi-header"></div>

    <div class="bottom-bar">
        <a href="#" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
        <a href="#" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
        <a href="#" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
        <a href="#" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
        <a href="#" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
        <a href="#" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
        <a href="#" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
        <a href="#" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
        <a href="#" class="icon-button"><img src="images/management.png" alt="Management"></a>
    </div>

</body>
</html>
