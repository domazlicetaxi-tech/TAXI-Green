<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; font-family: sans-serif; 
            overflow: hidden; /* Zabrání posouvání stránky */
        }

        .taxi-header {
            width: 100%;
            height: 100vh; /* Použijeme 100vh, ale pozadí bude centrovat */
            background-image: url('images/pozadi.png');
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .buttons-container {
            position: absolute;
            bottom: 20px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap; /* Zalamování pro mobily */
            padding: 0 5px;
            box-sizing: border-box;
        }

        .icon-button {
            width: 70px; /* Ideální pro mobily */
            height: 70px;
            border-radius: 50%;
            background-color: #000; /* Černá podkladová barva – žádná bílá! */
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
            padding: 8px; /* Odsazení loga od okraje */
            box-sizing: border-box;
            border: none;
            transition: transform 0.2s;
        }

        .icon-button:hover { transform: scale(1.1); }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Logo se nezvětší mimo kruh, ale bude celé */
            display: block;
        }

        /* Pro počítače */
        @media (min-width: 600px) {
            .icon-button { width: 100px; height: 100px; padding: 12px; }
            .buttons-container { bottom: 40px; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
