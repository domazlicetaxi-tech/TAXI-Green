<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        /* =========================================
           PŮVODNÍ STYLY PRO POČÍTAČ (DESKTOP)
           ========================================= */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: sans-serif; 
            overflow: hidden; 
            background-color: #000; 
        }

        .taxi-header {
            width: 100%;
            height: 100vh;
            background-image: url('images/pozadi.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .buttons-container {
            position: absolute;
            bottom: 30px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; 
        }

        .icon-button {
            width: 110px;
            height: 110px;
            border-radius: 50%; 
            border: none;
            background-color: #000; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            padding: 0; 
            cursor: pointer;
        }

        .icon-button:hover { 
            transform: scale(1.4); 
            z-index: 10;
        }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* =========================================
           VYSKAKOVACÍ OKNO - CENÍK (MODAL)
           ========================================= */
        .modal-overlay {
            display: none; /* Skryté ve výchozím stavu */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Tmavé poloprůhledné pozadí */
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: vyskoceni 0.3s ease-out;
        }

        @keyframes vyskoceni {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            line-height: 1;
        }

        .close-btn:hover { color: #000; }

        .modal-content h2 {
            margin-top: 0;
            color: #27ae60; /* Zelená barva ladící k Taxi Green */
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .sazba-box {
            background-color: #f9f9f9;
            border-left: 4px solid #27ae60;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 0 5px 5px 0;
        }

        .sazba-box:last-child {
            margin-bottom: 0;
        }

        .sazba-box h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #333;
        }

        .sazba-box p {
            margin: 3px 0;
            font-size: 14px;
            color: #555;
        }
        
        .sazba-box strong {
            color: #000;
        }

        /* =========================================
           NOVÉ STYLY PRO MOBILNÍ ZAŘÍZENÍ (TELEFONY)
           ========================================= */
        @media (max-width: 768px) {
            body, html {
                overflow: auto; 
                background-color: #000; 
            }

            .taxi-header {
                height: auto;
                min-height: 0; 
                padding-top: 60vw; 
                background-size: 100% auto; 
                background-position: top center; 
                background-repeat: no-repeat;
            }

            .buttons-container {
                position: relative; 
                bottom: auto;
                width: 100%;
                padding: 20px 10px 50px 10px; 
                box-sizing: border-box;
                margin-top: 0;
                gap: 12px;
            }

            .icon-button {
                width: 85px; 
                height: 85px;
            }

            .icon-button:hover {
                transform: scale(1.1); 
            }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            
            <a href="#" onclick="otevriCenik(event)" class="icon-button"><img src="images/cenik.png" alt="Ceník"></a>
            
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulačka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nákupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

    <div id="oknoCenik" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="zavriCenik()">&times;</span>
            <h2>Ceník jízdného</h2>
            
            <div class="sazba-box">
                <h3>Sazba po městě</h3>
                <p>Jízdné: <strong>34 Kč / km</strong></p>
                <p>Nástupní sazba: <strong>20 Kč</strong></p>
                <p>Čekání: <strong>6 Kč / min</strong></p>
            </div>

            <div class="sazba-box">
                <h3>Sazba mimo město</h3>
                <p>Jízdné: <strong>26 Kč / km</strong></p>
                <p>Nástupní sazba: <strong>20 Kč</strong></p>
                <p>Čekání: <strong>6 Kč / min</strong></p>
            </div>

            <div class="sazba-box">
                <h3>Okružní jízda</h3>
                <p>Jízdné: <strong>13 Kč / km</strong></p>
                <p>Nástupní sazba: <strong>20 Kč</strong></p>
                <p>Čekání: <strong>6 Kč / min</strong></p>
            </div>
        </div>
    </div>

    <script>
        // Otevření okna
        function otevriCenik(udalost) {
            udalost.preventDefault(); // Zabrání odskočení stránky nahoru při kliknutí na odkaz s "#"
            document.getElementById('oknoCenik').style.display = 'flex';
        }

        // Zavření okna křížkem
        function zavriCenik() {
            document.getElementById('oknoCenik').style.display = 'none';
        }

        // Zavření okna kliknutím kamkoliv do tmavého pozadí kolem okna
        window.onclick = function(udalost) {
            var okno = document.getElementById('oknoCenik');
            if (udalost.target === okno) {
                okno.style.display = 'none';
            }
        }
    </script>

</body>
</html>
