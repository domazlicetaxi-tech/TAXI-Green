<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: sans-serif; 
            background-color: #000; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Obrázek: necháme ho přirozeně se roztáhnout */
        .taxi-header {
            width: 100%;
            background-image: url('images/pozadi.png');
            background-size: cover; /* Obrázek vyplní šířku */
            background-position: center bottom;
            flex: 1; /* Zabere veškerý prostor nad pruhem */
            min-height: 70vh; /* Minimální výška obrázku */
        }

        /* Zelený pruh: zúžen na 100px a tmavě zelená */
        .bottom-bar {
            height: 100px; /* Zúženo */
            background-color: #2e660a; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Menší mezery */
            padding: 0 10px;
        }

        /* Tlačítka: zmenšena, aby se vešla do užšího pruhu */
        .icon-button {
            width: 75px;
            height: 75px;
            background-color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #a3ff66;
            overflow: hidden;
            transition: transform 0.2s;
            text-decoration: none;
        }
        .icon-button img { width: 90%; height: 90%; object-fit: cover; }
        .icon-button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="taxi-header"></div>

    <div class="bottom-bar">
        <a href="#" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
        <a href="#" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
        <a href="#" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
        <a href="#" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
        <a href="#" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
        <a href="#" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
        <a href="#" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
        <a href="#" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
        <a href="#" class="icon-button"><img src="images/management.png" alt="Management"></a>
    </div>

</body>
</html>
