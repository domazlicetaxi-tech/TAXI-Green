<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        /* Základní nastavení stránky */
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }

        /* Hlavní obrázek na pozadí */
        .taxi-header {
            width: 100%;
            height: 100vh;
            background-image: url('images/pozadi.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Zelený pruh na spodku */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 140px;
            background-color: rgba(163, 255, 102, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        /* Stylizace tlačítek */
        .icon-button {
            width: 110px;
            height: 110px;
            background-color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            overflow: hidden; /* Zajišťuje, že se vše uvnitř ořízne do kruhu */
            padding: 0;
            cursor: pointer;
        }

        /* Efekt při najetí myší - zvětšení */
        .icon-button:hover { 
            transform: scale(1.4); 
            z-index: 10;
        }

        /* Nastavení obrázku uvnitř tlačítka */
        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Obrázek vyplní celou plochu bez mezer */
            object-position: center; /* Drží logo vycentrované */
            display: block;
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="bottom-bar">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
            <a href="kalkulacka.html" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
