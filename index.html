<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        /* =========================================
           PŮVODNÍ STYLY PRO POČÍTAČ (DESKTOP)
           ========================================= */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: sans-serif; 
            overflow: hidden; 
            background-color: #000; 
        }

        .taxi-header {
            width: 100%;
            height: 100vh;
            background-image: url('images/pozadi.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .buttons-container {
            position: absolute;
            bottom: 30px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; 
        }

        .icon-button {
            width: 110px;
            height: 110px;
            border-radius: 50%; 
            border: none;
            background-color: #000; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            padding: 0; 
            cursor: pointer;
        }

        .icon-button:hover { 
            transform: scale(1.4); 
            z-index: 10;
        }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* =========================================
           NOVÉ STYLY PRO MOBILNÍ ZAŘÍZENÍ (TELEFONY)
           ========================================= */
        @media (max-width: 768px) {
            body, html {
                overflow: auto; /* Povolí scrollování stránky dolů */
                background-color: #000; /* Zbytek stránky pod obrázkem bude černý */
            }

            .taxi-header {
                height: auto;
                min-height: 0; /* Zrušíme to, aby pozadí zabíralo 100 % výšky displeje */
                
                /* TÍMTO VYTVOŘÍME MÍSTO PRO OBRÁZEK: 
                   Hodnota 60vw znamená 60 % šířky displeje telefonu.
                   - Pokud je obrázek zespodu uříznutý, ZVĚTŠI toto číslo (např. na 65vw nebo 70vw).
                   - Pokud je mezi obrázkem a tlačítky zbytečná černá mezera, ZMENŠI ho (např. na 50vw). */
                padding-top: 60vw; 
                
                background-size: 100% auto; /* Obrázek se roztáhne přesně na šířku displeje a zachová proporce */
                background-position: top center; /* Přibije obrázek úplně k hornímu okraji */
                background-repeat: no-repeat;
            }

            .buttons-container {
                position: relative; /* Zruší pevné přilepení k dolnímu okraji obrazovky */
                bottom: auto;
                width: 100%;
                padding: 20px 10px 50px 10px; /* Vytvoří hezké mezery okolo tlačítek */
                box-sizing: border-box;
                margin-top: 0;
                gap: 12px;
            }

            .icon-button {
                width: 85px; /* Trochu zmenšená tlačítka pro mobily */
                height: 85px;
            }

            .icon-button:hover {
                transform: scale(1.1); /* Jemnější zvětšení na dotyk */
            }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Ceník"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulačka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nákupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
