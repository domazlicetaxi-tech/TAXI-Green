<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow-x: hidden; }

        /* Hlavní obrázek na pozadí */
        .taxi-header {
            width: 100%;
            height: 100vh;
            background-image: url('images/pozadi.png');
            /* 'cover' zajistí vyplnění, ale může oříznout okraje. 
               Pokud chcete vidět celá auta, změňte na 'contain' */
            background-size: cover; 
            background-position: center bottom; /* Pozadí drží u spodku */
            background-repeat: no-repeat;
            position: relative;
        }

        /* Kontejner tlačítek */
        .buttons-container {
            position: absolute;
            bottom: 20px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap; /* Zalamování na mobilu */
            padding: 0 10px;
            box-sizing: border-box;
        }

        .icon-button {
            width: 70px; /* Menší tlačítka pro mobily, aby se vešla */
            height: 70px;
            border-radius: 50%;
            border: none;
            background-color: rgba(0, 0, 0, 0.3); /* Jemné podbarvení pro čitelnost */
            transition: transform 0.3s ease;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Logo se nikdy neořízne */
            display: block;
        }

        /* Úprava pro větší obrazovky (počítače) */
        @media (min-width: 768px) {
            .icon-button { width: 110px; height: 110px; }
            .buttons-container { gap: 20px; bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
