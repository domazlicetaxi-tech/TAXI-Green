<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: sans-serif; 
            background-color: #000; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Obrázek: Ukotven ke spodní straně, aby kola taxíků byla vždy u lišty */
        .taxi-header {
            width: 100%;
            background-image: url('images/pozadi.png');
            background-size: cover;
            background-position: center bottom;
            flex: 1; 
            min-height: 60vh;
        }

        /* Zelený pruh: těsně obepíná tlačítka */
        .bottom-bar {
            padding: 10px 20px; /* Těsné odsazení nahoře/dole */
            background-color: #2e660a; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        /* Tlačítka */
        .icon-button {
            width: 80px;
            height: 80px;
            background-color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #a3ff66;
            overflow: hidden;
            transition: transform 0.3s ease; /* Plynulý přechod */
            text-decoration: none;
        }

        /* Efekt zvětšení při najetí myší */
        .icon-button:hover {
            transform: scale(1.2); /* Zvětšení o 20 % */
        }

        .icon-button img { 
            width: 85%; 
            height: 85%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <div class="taxi-header"></div>

    <div class="bottom-bar">
        <a href="#" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
        <a href="#" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
        <a href="#" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
        <a href="#" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
        <a href="#" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
        <a href="#" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
        <a href="#" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
        <a href="#" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
        <a href="#" class="icon-button"><img src="images/management.png" alt="Management"></a>
    </div>

</body>
</html>
