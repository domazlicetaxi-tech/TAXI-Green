<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <style>
        /* =========================================
           PŮVODNÍ STYLY PRO POČÍTAČ (DESKTOP)
           ========================================= */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: sans-serif; 
            overflow: hidden; 
            background-color: #000; /* Přidáno černé pozadí pro jistotu */
        }

        .taxi-header {
            width: 100%;
            height: 100vh;
            background-image: url('images/pozadi.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .buttons-container {
            position: absolute;
            bottom: 30px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; 
        }

        .icon-button {
            width: 110px;
            height: 110px;
            border-radius: 50%; 
            border: none;
            background-color: #000; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            padding: 0; 
            cursor: pointer;
        }

        .icon-button:hover { 
            transform: scale(1.4); 
            z-index: 10;
        }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* =========================================
           NOVÉ STYLY PRO MOBILNÍ ZAŘÍZENÍ (TELEFONY)
           ========================================= */
        @media (max-width: 768px) {
            body, html {
                overflow: auto; /* DŮLEŽITÉ: Povolí scrollování stránky dolů */
            }

            .taxi-header {
                height: auto;
                min-height: 100vh;
                /* contain způsobí, že se obrázek neostřihne, ale zmenší se tak, aby byl vidět celý na šířku */
                background-size: contain; 
                background-repeat: no-repeat;
                background-position: top center; /* Přichytí obrázek na horní okraj */
            }

            .buttons-container {
                position: relative; /* Zruší fixní ukotvení dole, aby tlačítka mohla plout pod obrázkem */
                bottom: auto;
                /* Tento posun (margin-top) zajistí, že tlačítka začnou až pod obrázkem pozadí. 
                   Hodnota 70vw odpovídá většině formátů fotek. Kdyby tlačítka zasahovala 
                   do obrázku, hodnotu trochu zvedni (např. na 80vw). */
                margin-top: 70vw; 
                padding-bottom: 40px;
                gap: 12px; /* Mírné zmenšení mezer */
            }

            .icon-button {
                width: 85px; /* Tlačítka se na mobilu mírně zmenší, aby se jich vedle sebe vešlo více */
                height: 85px;
            }

            .icon-button:hover {
                transform: scale(1.15); /* Na dotykovém displeji není potřeba tak agresivní zvětšení */
            }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
