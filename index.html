<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Taxi Green Domažlice</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .admin-container {
            background-color: #222;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        h1 { color: #27ae60; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }
        .skryte { display: none; }
    </style>
</head>
<body>

    <div class="admin-container" id="loginSekce">
        <h1>Přihlášení</h1>
        <div class="input-group">
            <label for="heslo">Admin heslo:</label>
            <input type="password" id="heslo" placeholder="Zadejte heslo">
        </div>
        <button onclick="zkontrolujHeslo()">Odemknout</button>
    </div>

    <div class="admin-container skryte" id="nahravaciSekce">
        <h1>Nahrát do galerie</h1>
        <div class="input-group">
            <label for="fotkaInput">Vyberte fotografii z telefonu:</label>
            <input type="file" id="fotkaInput" accept="image/*">
        </div>
        <button id="nahratBtn" onclick="nahrajFotku()">Odeslat na web</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
        import { getDatabase, ref as dbRef, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js" 
        // Oprava importu pro Realtime Database:
        import { } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
        import { getDatabase, ref as dRef, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Tvoje upravená Firebase konfigurace s Realtime Database URL
        const firebaseConfig = {
            apiKey: "AIzaSyADi4Varza6j_uS8JBMYp9JIwiENIx4_L4",
            authDomain: "taxi-green-domazlice.firebaseapp.com",
            projectId: "taxi-green-domazlice",
            storageBucket: "taxi-green-domazlice.firebasestorage.app",
            messagingSenderId: "780503611359",
            appId: "1:780503611359:web:a106c743b759aab644f66a",
            databaseURL: "https://taxi-green-domazlice-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        // Inicializace Firebase
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getDatabase(app);

        // Funkce pro nahrání fotky
        window.nahrajFotku = async function() {
            const fileInput = document.getElementById('fotkaInput');
            const statusDiv = document.getElementById('status');
            const nahratBtn = document.getElementById('nahratBtn');
            const file = fileInput.files[0];

            if (!file) {
                statusDiv.innerText = "⚠️ Nejdříve vyberte fotku.";
                statusDiv.style.color = "#e74c3c";
                return;
            }

            statusDiv.innerText = "⏳ Nahrávám fotku...";
            statusDiv.style.color = "#f39c12";
            nahratBtn.disabled = true;

            try {
                // 1. Unikátní název pro soubor v úložišti
                const unikatniNazev = Date.now() + '-' + file.name;
                const fileStorageRef = sRef(storage, 'galerie/' + unikatniNazev);

                // 2. Nahrajeme soubor
                const uploadTask = uploadBytesResumable(fileStorageRef, file);

                uploadTask.on('state_changed', 
                    null, 
                    (error) => {
                        console.error(error);
                        statusDiv.innerText = "❌ Chyba při ukládání souboru.";
                        statusDiv.style.color = "#e74c3c";
                        nahratBtn.disabled = false;
                    }, 
                    async () => {
                        // 3. Získání odkazu na fotku
                        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);

                        // 4. Zápis do Realtime Database
                        const galerieDbRef = dRef(db, 'fotogalerie');
                        const novaFotkaRef = push(galerieDbRef);
                        
                        await set(novaFotkaRef, {
                            url: downloadURL,
                            vytvoreno: serverTimestamp()
                        });

                        statusDiv.innerText = "✅ Fotka úspěšně přidána na web!";
                        statusDiv.style.color = "#27ae60";
                        nahratBtn.disabled = false;
                        fileInput.value = ""; // Vynulovat výběr
                    }
                );
            } catch (error) {
                console.error("Chyba:", error);
                statusDiv.innerText = "❌ Neočekávaná chyba.";
                statusDiv.style.color = "#e74c3c";
                nahratBtn.disabled = false;
            }
        };
    </script>

    <script>
        function zkontrolujHeslo() {
            const heslo = document.getElementById('heslo').value;
            // Tady máš nastavené heslo: 26 3654 (můžeš si ho kdykoliv přepsat)
            if(heslo === "26 3654") {
                document.getElementById('loginSekce').classList.add('skryte');
                document.getElementById('nahravaciSekce').classList.remove('skryte');
            } else {
                alert("Nesprávné heslo!");
            }
        }
    </script>
</body>
</html>
