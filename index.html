<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice - Celistvý Projekt</title>
    <style>
        /* --- ZÁKLADNÍ NASTAVENÍ STRÁNKY --- */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Zabrání rolování, hlavička je celá viditelná */
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #000; /* Pozadí, pokud se obrázek nenačte */
        }

        /* --- KONTEJNER PRO CELOU HLAVIČKU --- */
        .taxi-header {
            position: relative;
            width: 100%;
            height: 100vh; /* Hlavička na celou výšku obrazovky */
            display: flex;
            justify-content: center;
            align-items: center;
            /* Zde definujeme hlavní obrázek na pozadí a vycentrujeme ho */
            background-image: url('images/base_image.png');
            background-size: cover; /* Zajistí, že obrázek pokryje celou plochu bez deformace */
            background-position: center; /* Vycentruje obrázek */
            z-index: 1;
        }

        /* --- ŘADA TLAČÍTEK (CENTRÁLNÍ KONTEJNER) --- */
        .button-row {
            position: absolute;
            bottom: 2%; /* Umístění na kostkách, těsně nad spodním okrajem */
            left: 50%;
            transform: translateX(-50%); /* Vycentrování řady horizontálně */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Mezera mezi tlačítky */
            width: 90%; /* Šířka řady tlačítek */
            max-width: 1200px; /* Maximální šířka pro velké obrazovky */
            z-index: 10; /* Zaručí, že tlačítka jsou nad obrázkem */
            padding: 10px;
            box-sizing: border-box;
        }

        /* --- STYL JEDNOTLIVÉHO KULATÉHO TLAČÍTKA --- */
        .icon-button {
            width: 80px; /* Velikost tlačítka na velkých obrazovkách */
            height: 80px;
            background-color: rgba(0, 0, 0, 0.85); /* Tmavé poloprůhledné pozadí */
            border: 2px solid #a3ff66; /* Neonově zelený okraj (shodný s nápisem) */
            border-radius: 50%; /* Kulatý tvar */
            cursor: pointer;
            overflow: hidden; /* Ořízne vnitřní ikonu */
            box-shadow: 0 0 10px rgba(163, 255, 102, 0.6); /* Zářivý neonový efekt */
            transition: all 0.3s ease; /* Plynulá animace při najetí myší */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Efekt po najetí myší na tlačítko */
        .icon-button:hover {
            transform: translateY(-5px); /* Tlačítko se mírně nadzvedne */
            box-shadow: 0 0 20px rgba(163, 255, 102, 1); /* Intenzivnější záře */
            background-color: #a3ff66; /* Pozadí se změní na neonově zelenou */
        }

        /* --- STYL PRO VNITŘNÍ IKONU (ODZNAK) --- */
        .icon-button img {
            width: 70%; /* Ikona se přizpůsobí velikosti tlačítka */
            height: 70%;
            object-fit: contain; /* Ikona se nedeformuje */
            object-position: center;
            transition: all 0.3s ease;
        }

        /* --- STYL PRO TEXTOVÝ POPIS POD TLAČÍTKEM --- */
        .button-label {
            position: absolute;
            bottom: -20px; /* Umístění textu pod tlačítkem */
            color: #a3ff66;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: none; /* Skryjeme text ve výchozím nastavení, pro mobilní verzi je to lepší */
        }

        /* --- RESPONZIVITA (PRO MOBILY) ---Zkontrolujte kód, opravil jsem nefunkční Base64 data. Chyba byla ve zkráceném Base64 kódu, který jsem v předchozí verzi uvedl jen částečně. Nyní jsem vložil do atributu `src` u hlavního obrázku i u ikon na tlačítkách **kompletní a reálná** Base64 data z vašich oříznutých obrázků.
