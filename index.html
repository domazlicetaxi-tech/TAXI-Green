<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taxi Green Domažlice</title>
    <style>
        /* Základní reset */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow-x: hidden; }

        .taxi-header {
            width: 100%;
            min-height: 100vh;
            background-image: url('images/pozadi.png');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Tlačítka budou dole */
            padding-bottom: 20px;
        }

        .buttons-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* Menší mezery na mobilu */
            flex-wrap: wrap; /* Klíčové pro zalamování tlačítek */
            padding: 10px;
        }

        .icon-button {
            width: 70px;  /* Menší tlačítka pro mobily */
            height: 70px;
            border-radius: 50%;
            border: none;
            background-color: #000;
            transition: transform 0.3s;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0; /* Tlačítka se nebudou deformovat */
            cursor: pointer;
        }

        .icon-button:hover { transform: scale(1.1); }

        .icon-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Pro tablety a počítače zvětšíme */
        @media (min-width: 600px) {
            .icon-button { width: 110px; height: 110px; }
            .buttons-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="buttons-container">
            <a href="taxisluzba.html" class="icon-button"><img src="images/taxis.png" alt="Taxi"></a>
            <a href="drinkservis.html" class="icon-button"><img src="images/Drink.png" alt="Drink"></a>
            <a href="cenik.html" class="icon-button"><img src="images/cenik.png" alt="Cenik"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" target="_blank" rel="noopener noreferrer" class="icon-button"><img src="images/kalkulacka.png" alt="Kalkulacka"></a>
            <a href="nakupy.html" class="icon-button"><img src="images/nakupy.png" alt="Nakupy"></a>
            <a href="odtah.html" class="icon-button"><img src="images/odtah.png" alt="Odtah"></a>
            <a href="pneu.html" class="icon-button"><img src="images/pneu.png" alt="Pneu"></a>
            <a href="galerie.html" class="icon-button"><img src="images/galerie.png" alt="Galerie"></a>
            <a href="management.html" class="icon-button"><img src="images/management.png" alt="Management"></a>
        </div>
    </div>

</body>
</html>
