<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Green Domažlice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background-color: #000; }
        
        /* Pozadí: contain zajistí, že uvidíš vždy celý obrázek náměstí */
        .taxi-header { 
            width: 100%; height: 100vh; 
            background-image: url('images/pozadi.png'); 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center center; 
            position: relative; 
        }

        /* Tlačítka nahoře */
        .top-left-container { position: absolute; top: 10px; left: 10px; z-index: 100; }
        .top-right-container { position: absolute; top: 10px; right: 10px; z-index: 100; }

        .icon-button { 
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff;
            background-color: #27ae60; color: #fff; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 24px; cursor: pointer; transition: 0.3s;
        }
        .whatsapp-btn { background-color: #25D366; }

        .buttons-container { 
            position: absolute; bottom: 20px; width: 100%; display: flex; 
            justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; 
        }
        .menu-btn { width: 70px; height: 70px; border-radius: 50%; border: none; overflow: hidden; cursor: pointer; }
        .menu-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Modaly zůstávají stejné jako minule */
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background-color: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
        
        @media (max-width: 768px) {
            .taxi-header { background-size: contain; } /* Obrázek bude vidět celý */
        }
    </style>
</head>
<body>

    <div class="taxi-header">
        <div class="top-left-container">
            <a href="tel:+420607722555" class="icon-button"><i class="fas fa-phone"></i></a>
        </div>
        <div class="top-right-container">
            <a href="https://wa.me/420773087057" class="icon-button whatsapp-btn"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div class="buttons-container">
            <a href="#" onclick="otevri('oknoDrink')" class="menu-btn"><img src="images/Drink.png"></a>
            <a href="#" onclick="otevri('oknoCenik')" class="menu-btn"><img src="images/cenik.png"></a>
            <a href="https://domazlicetaxi-tech.github.io/Kalkulacka/" class="menu-btn"><img src="images/kalkulacka.png"></a>
            <a href="#" onclick="otevri('oknoNakupy')" class="menu-btn"><img src="images/nakupy.png"></a>
            <a href="#" onclick="otevri('oknoOdtah')" class="menu-btn"><img src="images/odtah.png"></a>
            <a href="#" onclick="otevri('oknoPneu')" class="menu-btn"><img src="images/pneu.png"></a>
            <a href="galerie.html" class="menu-btn"><img src="images/galerie.png"></a>
            <a href="#" onclick="tajnyKlik(event)" class="menu-btn"><img src="images/management.png"></a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        
        // TVŮJ KONFIGURACE (VLOŽ SEM)
        const firebaseConfig = {
            apiKey: "AIzaSyADi4Varza6j_uS8JBMYp9JIwiENIx4_L4",
            authDomain: "taxi-green-domazlice.firebaseapp.com",
            projectId: "taxi-green-domazlice",
            storageBucket: "taxi-green-domazlice.appspot.com",
            messagingSenderId: "780503611359",
            appId: "1:780503611359:web:a106c743b759aab644f66a",
            databaseURL: "https://taxi-green-domazlice-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        initializeApp(firebaseConfig);
        
        // Funkce pro otevření a heslo
        window.otevri = (id) => document.getElementById(id).style.display = 'flex';
        window.tajnyKlik = (e) => { e.preventDefault(); if(confirm("Admin vstup?")) otevri('oknoAdmin'); };
        // ... (zbytek logiky)
    </script>
</body>
</html>
